<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="mouse-glow"></div>

    <div class="container">
        <div class="card">

            <img src="images/horizon-logo.png" class="logo" alt="Horizon Edge SL">

            <h1>AI Mastery Program Registration</h1>

            <p>
                Fill in your details below.
            </p>

            <form id="registrationForm">

                <!-- Progress -->
                <div class="progress">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <p id="progressText">0% Completed</p>

                <!-- Name -->
                <div class="input-box">
                    <input type="text" id="name" required>
                    <label>Full Name</label>
                </div>

                <!-- Email -->
                <div class="input-box">
                    <input type="email" id="email" required>
                    <label>Email Address</label>
                </div>

                <!-- Phone -->
                <div class="input-box">
                    <input type="tel" id="phone" required>
                    <label>WhatsApp Number</label>
                </div>

                <!-- Path -->
                <div class="path-section">

                    <h3>🎯 Choose Your Path</h3>

                    <label class="radio ai">
                        <input type="radio" name="path" value="AI Path">
                        <span>AI Path</span>
                    </label>

                    <label class="radio creator">
                        <input type="radio" name="path" value="Content Creator Path">
                        <span>Content Creator Path</span>
                    </label>

                    <label class="radio marketing">
                        <input type="radio" name="path" value="Digital Marketing Path">
                        <span>Digital Marketing Path</span>
                    </label>

                    <label class="radio youth">
                        <input type="radio" name="path" value="Youth Path">
                        <span>Youth Path</span>
                    </label>

                </div>

                <!-- District -->
                <div class="select-box">
                    <select id="district" required>
                        <option value="">Select Your District</option>

                        <option>Colombo</option>
                        <option>Gampaha</option>
                        <option>Kalutara</option>
                        <option>Kandy</option>
                        <option>Matale</option>
                        <option>Nuwara Eliya</option>
                        <option>Galle</option>
                        <option>Matara</option>
                        <option>Hambantota</option>
                        <option>Jaffna</option>
                        <option>Kilinochchi</option>
                        <option>Mannar</option>
                        <option>Vavuniya</option>
                        <option>Mullaitivu</option>
                        <option>Batticaloa</option>
                        <option>Ampara</option>
                        <option>Trincomalee</option>
                        <option>Kurunegala</option>
                        <option>Puttalam</option>
                        <option>Anuradhapura</option>
                        <option>Polonnaruwa</option>
                        <option>Badulla</option>
                        <option>Monaragala</option>
                        <option>Ratnapura</option>
                        <option>Kegalle</option>
                    </select>
                </div>

                <!-- Promo -->
                <div class="input-box">
                    <input type="text" id="promo">
                    <label>Promo Code</label>
                </div>

                <div id="promoMessage"></div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn">
                    <span id="btnSpinner" class="btn-spinner" style="display:none;"></span>
                    <span id="btnText">Submit</span>
                </button>

            </form>

        </div>
    </div>

    <!-- Success Popup -->
    <div id="successPopup">

        <div class="spinner"></div>

        <h2>🎉 Registration Successful!</h2>

        <p>Your Registration ID:</p>

        <h1 id="registrationID">
            HESL/000
        </h1>

        <p>Please check your email for confirmation.</p>

       <p id="countdownText">
    Opening WhatsApp in <span id="countdown">5</span> seconds...
</p>

<a
    id="whatsappBtn"
    class="whatsapp-btn"
    href="https://wa.me/94701121744?text=Hi%20Horizon%20Edge%20SL!%20I%20have%20completed%20my%20registration.%20My%20Registration%20ID%20is%20"
    target="_blank">

    💬 Continue on WhatsApp

</a>

    </div>

    <script src="script.js"></script>

</body>

</html>
